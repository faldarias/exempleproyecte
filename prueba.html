<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hola Alumna 1</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #6dd5fa 0%, #ffffff 50%, #f6d365 100%);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #2c3e50;
        }
        .card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(44, 62, 80, 0.16);
            padding: 40px 48px;
            text-align: center;
            max-width: 520px;
            width: 90%;
            backdrop-filter: blur(10px);
        }
        h1 {
            margin: 0 0 16px;
            font-size: clamp(2.5rem, 4vw, 4rem);
            letter-spacing: -0.05em;
        }
        p {
            margin: 0 0 24px;
            line-height: 1.7;
            color: #4a5a6a;
            font-size: 1.1rem;
        }
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(90deg, #5b9df3 0%, #37d5d6 100%);
            color: hsl(0, 0%, 100%);
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(30, 144, 255, 0.24);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>¡Hola, alumna!</h1>
        <p>Bienvenida a tu página mejorada. Disfruta de un diseño suave, moderno y adaptado a cualquier tamaño de pantalla.</p>
        <a href="#" class="button">Explorar más</a>
    </div>
</body>
</html>
