<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Programación SRI - Módulo de Servicios de Red e Internet">
    <meta name="author" content="Paco Aldarias">
    <title>Programación SRI - Seleccionar idioma</title>
    <link rel="stylesheet" href="estilo.css">
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #e8d5f7 0%, #d4c9f0 100%);
            padding: 20px;
        }

        .language-selector {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 900px;
            width: 100%;
        }

        .ciclos-image {
            width: 100%;
            max-width: 800px;
            height: auto;
            margin: 0 auto 30px;
            display: block;
            border-radius: 8px;
        }

        .language-selector h1 {
            color: #6b46c1;
            margin-bottom: 15px;
            font-size: 2.5rem;
        }

        .language-selector p {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }

        .language-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .language-buttons a {
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-castellano {
            background-color: #dc3545;
            color: white;
        }

        .btn-castellano:hover {
            background-color: #c82333;
            transform: scale(1.05);
        }

        .btn-valenciano {
            background-color: #007bff;
            color: white;
        }

        .btn-valenciano:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }

        footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .language-selector {
                padding: 20px;
            }

            .language-selector h1 {
                font-size: 1.8rem;
            }

            .language-buttons {
                flex-direction: column;
            }

            .language-buttons a {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="language-selector">
        <img src="imagenes/ciclos-informatica.svg" alt="Ciclos Formativos de Informática" class="ciclos-image">
        <h1>Programación SRI</h1>
        <p>Servicios de Red e Internet</p>
        <p style="font-size: 16px; color: #999; margin-bottom: 30px;">Selecciona tu idioma / Selecciona el teu idioma</p>
        <div class="language-buttons">
            <a href="programacion.html?lang=es" class="btn-castellano">Castellano</a>
            <a href="programacion.html?lang=va" class="btn-valenciano">Valenciano</a>
        </div>
        <footer>
            <p>&copy; 2026 Conselleria d'Educació. Ciclo Formativo ASIR.</p>
        </footer>
    </div>
</body>

</html>
