<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programación SRI - Seleccionar idioma</title>
    <link rel="stylesheet" href="estilo.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .language-selector {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .language-selector h1 {
            color: #333;
            margin-bottom: 30px;
        }

        .language-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .language-buttons a {
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-castellano {
            background-color: #dc3545;
            color: white;
        }

        .btn-castellano:hover {
            background-color: #c82333;
            transform: scale(1.05);
        }

        .btn-valenciano {
            background-color: #007bff;
            color: white;
        }

        .btn-valenciano:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="language-selector">
        <h1>Programación SRI</h1>
        <p style="font-size: 18px; color: #666; margin-bottom: 30px;">Selecciona tu idioma / Selecciona el teu idioma</p>
        <div class="language-buttons">
            <a href="programacion.html?lang=es" class="language-buttons btn-castellano">Castellano</a>
            <a href="programacion.html?lang=va" class="language-buttons btn-valenciano">Valenciano</a>
        </div>
    </div>
</body>

</html>
